# Conveyor build + auto-update config for Sketchbook.
#
# What Conveyor does:
#   - Builds Mac (.dmg), Windows (.msi), and Linux (.AppImage) installers from
#     the same Compose Desktop Gradle project.
#   - Generates an "update site" — a static directory that an installed
#     Sketchbook app polls on launch to check for and apply delta updates.
#   - Signs everything with a key we control (clients verify before applying).
#
# Distribution shape:
#   site.base-url -> https://storage.googleapis.com/sketchbook-releases/
#   (a public GCS bucket; auto-updater fetches anonymously over HTTPS)
#
# Source stays in the private srMarlins/sketchbook repo. GitHub Releases hold
# changelog notes only (no binary assets) and link to the bucket URLs.
#
# One-time bootstrap (NOT committed; see docs/runbooks/release.md):
#   1. Install Conveyor CLI: brew install --cask hydraulic/tap/conveyor
#                            (Mac); scoop install conveyor (Win); apt on Linux.
#   2. Generate signing keys: conveyor keys generate
#   3. Push the resulting `conveyor.signing.json` content into GitHub Secrets
#      as CONVEYOR_SIGNING_KEY (the workflow restores it before building).
#   4. Run tools/setup-releases-bucket.ps1 once to create the public bucket.

include required("/stdlib/jvm/17/compose.conf")

app {
  display-name = "Sketchbook"
  fsname       = "sketchbook"
  rdns-name    = "app.sketchbook"
  vendor       = "srMarlins"
  description  = "A versioning and sync layer for your Ableton Live library."

  # Pulled from the Gradle build via the compose.conf include — keeps Conveyor
  # and Compose Desktop in sync. No need to set version here; reads from
  # `app-desktop`'s `compose.desktop.application` block.
  jvm {
    gradle-project = ":app-desktop"
  }

  # Update site URL embedded in every installer. Once set, do not change without
  # planning a "trampoline" release that points old installs at the new URL.
  site {
    base-url = "https://storage.googleapis.com/sketchbook-releases"
  }

  # Cross-platform targets. Conveyor builds these from any single host runner —
  # the GH Actions workflow uses ubuntu-latest to build everything.
  machines = [
    "macos.amd64", "macos.aarch64",
    "windows.amd64",
    # linux.amd64 is fine to add later when you actually run on Linux.
  ]

  # Icons — replace placeholder once you have real ones.
  # icons = "icon.svg"

  # Behavior on update: silent download, prompt-on-restart.
  updates = "background"

  # Optional: signing identities for first-class OS trust. Empty for now —
  # personal-use builds work without them (the OS warns once on first launch).
  # mac.signing-identity = "Developer ID Application: ..."
  # windows.signing.cert = "..."
}

# When you actually have signing keys generated:
#
# conveyor.signing-key = ${env.CONVEYOR_SIGNING_KEY}
#
# (The release workflow injects CONVEYOR_SIGNING_KEY from GitHub Secrets at
# build time. For local builds, store it at ~/.conveyor/signing.json and
# Conveyor picks it up automatically — see runbook.)

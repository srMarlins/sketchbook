[project]
name = "audio-core"
version = "0.1.0dev"
requires-python = ">=3.11"
dependencies = [
  "lxml>=5.0",
  "blake3>=1.0",
  "psutil>=5.9",
  "pydantic>=2.6",
  "watchdog>=4",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "ruff>=0.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["audio_core"]

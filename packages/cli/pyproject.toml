[project]
name = "audio-cli"
version = "0.1.0dev"
requires-python = ">=3.11"
dependencies = ["audio-core", "typer>=0.12", "rich>=13"]

[project.scripts]
audio = "audio_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["audio_cli"]

[project]
name = "audio-mcp"
version = "0.1.0dev"
requires-python = ">=3.11"
dependencies = ["audio-core", "fastmcp>=0.3"]

[project.scripts]
audio-mcp = "audio_mcp.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["audio_mcp"]

[project]
name = "audio-web"
version = "0.1.0dev"
requires-python = ">=3.11"
dependencies = [
  "audio-core",
  "fastapi>=0.110",
  "sse-starlette>=2.0",
  "uvicorn[standard]>=0.27",
]

[project.scripts]
audio-web = "audio_web.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["audio_web"]

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 20
  LongMethod:
    active: true
    # Bumped from 80 â†’ 100 after spotless line-wrapping was aligned: existing Compose
    # composables expanded by ~5â€“15 lines purely from parameter / argument wrapping, not
    # added logic. 100 keeps the rule active for genuine long-function regressions.
    allowedLines: 100
  LongParameterList:
    active: true
    allowedFunctionParameters: 8
    allowedConstructorParameters: 10
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotatedParameter:
      - "Composable"
  ComplexCondition:
    active: true
    allowedConditions: 5
  TooManyFunctions:
    active: true
    allowedFunctionsPerFile: 30
    allowedFunctionsPerClass: 20
    allowedFunctionsPerInterface: 20
    allowedFunctionsPerObject: 20
    allowedFunctionsPerEnum: 20
    ignoreOverridden: true
    ignoreAnnotatedFunctions:
      - "Composable"

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
  # Compose theming code uses Quintet-style destructuring (e.g. Button.kt's variantâ†’colors
  # mapping). The 3-component default is too tight for that pattern.
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 5
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
    ignoreEnums: true
    ignoreAnnotated:
      - "Composable"
      - "Preview"
  ReturnCount:
    active: true
    max: 4
  # detekt 2.x: `UnusedPrivateMember` was split into 3 finer-grained rules.
  UnusedPrivateClass:
    active: true
  UnusedPrivateFunction:
    active: true
    ignoreAnnotated:
      - "Composable"
      - "Preview"
  UnusedPrivateProperty:
    active: true

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false  # too noisy in coroutine code

# detekt's `ktlint:` ruleset is `dev.detekt:detekt-rules-ktlint-wrapper` â€” literally the
# ktlint formatter wrapped as detekt rules. Spotless already runs ktlint via `.editorconfig`,
# so enabling this here means running ktlint twice with subtly different defaults (different
# code-style preset, different rule thresholds), which produces a cross-tool flap where
# spotlessApply's output fails detekt and vice versa. Per detekt maintainer guidance
# (https://github.com/detekt/detekt/discussions/5997), pick one. We pick spotless. Detekt's
# *standard* MaxLineLength rule (above) still enforces the 140-col cap as a quality gate.
ktlint:
  active: false

# Compose Lints (compose-rules 0.5.x â€” ships matching detekt 2.0.0-alpha.3 bindings).
# Rule list aligned with https://mrmans0n.github.io/compose-rules/detekt/ for 0.5.x.
# Notable from 0.4.x: `ModifierComposable` is gone (replaced by `ModifierComposed`);
# `ModifierClickableOrder`, `ContentSlotReused`, `LambdaParameterEventTrailing`,
# `LambdaParameterInRestartableEffect`, `MutableStateAutoboxing`,
# `RememberContentMissing`, `DefaultsVisibility`, `ParameterNaming`,
# `ContentTrailingLambda`, `CompositionLocalAllowlist`, `CompositionLocalNaming`,
# `ComposableAnnotationNaming`, `MutableStateParam` are 0.5.x defaults left at
# their built-in defaults rather than enumerated here.
Compose:
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  ContentEmitterReturningValues:
    active: true
  ModifierClickableOrder:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
  ModifierNaming:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  PreviewPublic:
    active: true
  RememberMissing:
    active: true
  ViewModelForwarding:
    active: true
  # `ViewModelInjection` flags Hilt's `viewModel()` accessor â€” we use Metro's
  # `metroViewModel()` at the NavEntry boundary instead, so leave it off.
  ViewModelInjection:
    active: false

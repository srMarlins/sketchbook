name: pages

# Deploys site/ to GitHub Pages. Trigger on:
#   - any change to site/ on main (so iteration is instant)
#   - manual dispatch (so we can re-deploy without a content change)
#   - successful release runs (so direct-download links in index.html get
#     rewritten to the new versioned bucket filenames after each release)
#
# Build step: index.html contains `{{VERSION}}` placeholders for per-platform
# direct-download links. Before upload, we curl the bucket's
# metadata.properties (server-side, no CORS), extract app.version, and
# substitute. This avoids the runtime CORS-blocked fetch we used to do.
on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:
  workflow_run:
    workflows: ["release"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Skip mid-flight superseded deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Substitute live version into index.html
        run: |
          set -euo pipefail
          # Pull the latest released version from the bucket. If the fetch
          # fails (e.g. before the first release), fall back to "0.0.0".
          VERSION="$(curl -fsSL https://storage.googleapis.com/sketchbook-releases/metadata.properties \
            | grep -E '^app\.version=' \
            | head -1 \
            | cut -d= -f2 \
            | tr -d '[:space:]' || true)"
          if [ -z "${VERSION:-}" ]; then VERSION="0.0.0"; fi
          echo "Substituting VERSION=$VERSION"
          sed -i "s|{{VERSION}}|${VERSION}|g" site/index.html

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5

      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4

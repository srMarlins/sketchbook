name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gradle check (skip-on-empty until PR-1 wires the build)
        shell: bash
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew --no-daemon check
          else
            echo "No Gradle wrapper yet — bootstrap CI placeholder. Will be wired in PR-1."
          fi

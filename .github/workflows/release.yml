name: release

# Triggered by pushing a `v*` tag. Builds Mac + Windows installers via
# Conveyor, uploads the static "update site" to the public GCS releases
# bucket, and creates a GitHub Release with a changelog (no binary assets;
# binaries live on the bucket so auto-update can fetch them anonymously).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write    # to create the GitHub Release + upload notes
  id-token: write    # to mint the OIDC token for Workload Identity Federation

jobs:
  build:
    name: build + sign + upload site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for changelog generation

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      # Project version comes from the tag (v0.0.1 -> 0.0.1). ORG_GRADLE_PROJECT_*
      # is auto-converted by Gradle into -Pversion, so any subsequent gradlew
      # invocation (including Conveyor's internal :app-desktop:printConveyorConfig
      # via the conveyor.conf hashbang include) sees it.
      - name: Compute project version from tag
        run: echo "ORG_GRADLE_PROJECT_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Build the Compose Desktop bundle that Conveyor packages.
      - name: Gradle build
        run: ./gradlew --no-daemon :app-desktop:build

      # Build the cross-platform site (Mac dmg, Windows msi, update metadata).
      # Uses Hydraulic's official action: handles install + caching + license
      # acceptance + signing-key restore. Bump the @v tag in lockstep with the
      # Windows-install version pin in docs/runbooks/release.md.
      - name: Conveyor make site
        uses: hydraulic-software/conveyor/actions/build@v22.0
        with:
          signing_key: ${{ secrets.CONVEYOR_SIGNING_KEY }}
          agree_to_license: 1
          command: make site

      # Auth to GCS via Workload Identity Federation (no long-lived JSON key).
      # GitHub mints an OIDC token; GCP exchanges it for a short-lived access
      # token bound to sketchbook-release-uploader, which has bucket-scoped
      # roles/storage.objectAdmin on gs://sketchbook-releases. The provider's
      # attribute condition restricts this to repos owned by srMarlins.
      - id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/823073361838/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: sketchbook-release-uploader@sketchbook-jtf-2026.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload site to gs://sketchbook-releases
        run: |
          gsutil -m -h "Cache-Control:public, max-age=300" \
            cp -r output/* gs://sketchbook-releases/

      # Generate human changelog from commits since the previous tag.
      - name: Build changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)
          if [ -z "$PREV" ]; then
            git log --pretty='- %s (%h)' > NOTES.md
          else
            git log "$PREV..${GITHUB_REF_NAME}" --pretty='- %s (%h)' > NOTES.md
          fi
          {
            echo ""
            echo "## Download"
            echo ""
            echo "Auto-update is enabled — installed Sketchbook clients will receive this version on next launch."
            echo ""
            echo "Fresh installs:"
            echo "- macOS (Apple Silicon): https://storage.googleapis.com/sketchbook-releases/Sketchbook-${GITHUB_REF_NAME#v}-macos-aarch64.dmg"
            echo "- macOS (Intel): https://storage.googleapis.com/sketchbook-releases/Sketchbook-${GITHUB_REF_NAME#v}-macos-amd64.dmg"
            echo "- Windows (x64): https://storage.googleapis.com/sketchbook-releases/Sketchbook-${GITHUB_REF_NAME#v}-windows-amd64.msi"
          } >> NOTES.md

      # Create the GitHub Release with notes only (no binaries — those live on
      # the bucket so the auto-updater can fetch anonymously).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Sketchbook ${{ github.ref_name }}
          body_path: NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

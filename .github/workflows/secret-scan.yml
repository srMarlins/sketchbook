name: secret-scan

# Runs gitleaks on every PR + push to main to catch accidentally-committed
# secrets BEFORE they hit the remote. Belt-and-suspenders alongside .gitignore.
#
# Why gitleaks specifically:
#  - Free, OSS, no GitHub Advanced Security plan required.
#  - Has built-in detection for Google service-account JSON keys,
#    AWS keys, GitHub PATs, GCP API keys, generic high-entropy secrets, etc.
#  - Runs in ~10 seconds on a small repo.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history to scan PRs

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE — we use the OSS edition.
          GITLEAKS_ENABLE_COMMENTS: true       # comment on PR if findings
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true # upload scan report on failure
